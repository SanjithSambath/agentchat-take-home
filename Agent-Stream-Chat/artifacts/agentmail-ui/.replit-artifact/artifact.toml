kind = "web"
previewPath = "/"
title = "AgentMail"
version = "1.0.0"
id = "artifacts/agentmail-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20311

[services.development]
run = "pnpm --filter @workspace/agentmail-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agentmail-ui", "run", "build" ]
publicDir = "artifacts/agentmail-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20311"
BASE_PATH = "/"
