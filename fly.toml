app = "agentmail"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = 35

[build]

[env]
  PORT = "8080"
  LOG_LEVEL = "info"
  S2_BASIN = "agentmail"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 10000
    soft_limit = 8000

  [http_service.http_options]
    h2_backend = true

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"
  unhealthy_threshold = 3
  healthy_threshold = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
